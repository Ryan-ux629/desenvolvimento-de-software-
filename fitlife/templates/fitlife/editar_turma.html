{% extends 'fitlife/base.html' %}

{% block title %}Editar Turma — FitLife{% endblock %}
{% block topbar_title %}Editar Turma{% endblock %}
{% block nav_turmas %}active{% endblock %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Editar Turma</h1>
    <a href="{% url 'listar_turmas' %}" class="btn-secondary">
        <i class="ti ti-arrow-left"></i> Voltar
    </a>
</div>

<div class="card" style="max-width: 640px;">

    <form method="post">
        {% csrf_token %}

        <!-- Código da Turma (readonly) -->
        <div style="margin-bottom: 1rem;">
            <label style="font-size: 13px; font-weight: 500; color: #1a1a2e; display: block; margin-bottom: 5px;">
                Código da Turma
                <span style="font-size: 11px; color: #999; font-weight: 400;">(não editável)</span>
            </label>
            <input type="text" value="#{{ turma.cod_turma }}" readonly
                style="width: 100%; padding: 8px 12px; border: 0.5px solid #e0e0e0; border-radius: 8px; font-size: 13.5px; outline: none; background: #f5f5f5; color: #999; cursor: not-allowed;">
        </div>

        <!-- Modalidade -->
        <div style="margin-bottom: 1rem;">
            <label for="cod_modalidade" style="font-size: 13px; font-weight: 500; color: #1a1a2e; display: block; margin-bottom: 5px;">
                Modalidade <span style="color: #e94560;">*</span>
            </label>
            <select id="cod_modalidade" name="cod_modalidade" required
                style="width: 100%; padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13.5px; outline: none; background: #fff;">
                {% for modalidade in modalidades %}
                    <option value="{{ modalidade.cod_modalidade }}"
                        {% if turma.cod_modalidade.cod_modalidade == modalidade.cod_modalidade %}selected{% endif %}>
                        {{ modalidade.nome_mod }} ({{ modalidade.dificuldade }} — {{ modalidade.duracao }} min)
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Professor + Unidade -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
            <div>
                <label for="cref_professor" style="font-size: 13px; font-weight: 500; color: #1a1a2e; display: block; margin-bottom: 5px;">
                    Professor Responsável <span style="color: #e94560;">*</span>
                </label>
                <select id="cref_professor" name="cref_professor" required
                    style="width: 100%; padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13.5px; outline: none; background: #fff;">
                    {% for professor in professores %}
                        <option value="{{ professor.cref }}"
                            {% if turma.cref_professor.cref == professor.cref %}selected{% endif %}>
                            {{ professor.nome_prof }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="cod_unidade" style="font-size: 13px; font-weight: 500; color: #1a1a2e; display: block; margin-bottom: 5px;">
                    Unidade <span style="color: #e94560;">*</span>
                </label>
                <select id="cod_unidade" name="cod_unidade" required
                    style="width: 100%; padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13.5px; outline: none; background: #fff;">
                    {% for unidade in unidades %}
                        <option value="{{ unidade.cod_unidade }}"
                            {% if turma.cod_unidade.cod_unidade == unidade.cod_unidade %}selected{% endif %}>
                            {{ unidade }}
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Capacidade -->
        <div style="margin-bottom: 1.5rem;">
            <label for="capacidade" style="font-size: 13px; font-weight: 500; color: #1a1a2e; display: block; margin-bottom: 5px;">
                Capacidade Máxima <span style="color: #e94560;">*</span>
            </label>
            <input type="number" id="capacidade" name="capacidade"
                value="{{ turma.capacidade }}" min="1" required
                style="width: 100%; padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13.5px; outline: none;">
        </div>

        <!-- Botões -->
        <div style="display: flex; gap: 10px; padding-top: 1rem; border-top: 0.5px solid #f0f0f0;">
            <button type="submit" class="btn-primary">
                <i class="ti ti-check"></i> Salvar alterações
            </button>
            <a href="{% url 'listar_turmas' %}" class="btn-secondary">Cancelar</a>
        </div>

    </form>
</div>

{% endblock %}
