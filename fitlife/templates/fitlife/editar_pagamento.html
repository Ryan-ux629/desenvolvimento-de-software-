{% extends 'fitlife/base.html' %}

{% block title %}Editar Pagamento — FitLife{% endblock %}
{% block topbar_title %}Editar Pagamento{% endblock %}
{% block nav_pagamentos %}active{% endblock %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Editar Pagamento</h1>
    <a href="{% url 'listar_pagamentos' %}" class="btn-secondary">
        <i class="ti ti-arrow-left"></i> Voltar
    </a>
</div>

<div class="card" style="max-width: 640px;">

    <form method="post">
        {% csrf_token %}

        <!-- Código do Pagamento (readonly) -->
        <div style="margin-bottom: 1rem;">
            <label style="font-size: 13px; font-weight: 500; color: #1a1a2e; display: block; margin-bottom: 5px;">
                Código do Pagamento
                <span style="font-size: 11px; color: #999; font-weight: 400;">(não editável)</span>
            </label>
            <input type="text" value="#{{ pagamento.cod_pagamento }}" readonly
                style="width: 100%; padding: 8px 12px; border: 0.5px solid #e0e0e0; border-radius: 8px; font-size: 13.5px; outline: none; background: #f5f5f5; color: #999; cursor: not-allowed;">
        </div>

        <!-- Contrato (readonly) -->
        <div style="margin-bottom: 1rem;">
            <label style="font-size: 13px; font-weight: 500; color: #1a1a2e; display: block; margin-bottom: 5px;">
                Contrato
                <span style="font-size: 11px; color: #999; font-weight: 400;">(não editável)</span>
            </label>
            <input type="text"
                value="Contrato #{{ pagamento.num_contrato.num_contrato }} — {{ pagamento.num_contrato.cpf_aluno.nome_aluno }}"
                readonly
                style="width: 100%; padding: 8px 12px; border: 0.5px solid #e0e0e0; border-radius: 8px; font-size: 13.5px; outline: none; background: #f5f5f5; color: #999; cursor: not-allowed;">
        </div>

        <!-- Forma de Pagamento + Status -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
            <div>
                <label for="forma_pagamento" style="font-size: 13px; font-weight: 500; color: #1a1a2e; display: block; margin-bottom: 5px;">
                    Forma de Pagamento <span style="color: #e94560;">*</span>
                </label>
                <select id="forma_pagamento" name="forma_pagamento" required
                    style="width: 100%; padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13.5px; outline: none; background: #fff;">
                    <option value="PIX"               {% if pagamento.forma_pagamento == 'PIX' %}selected{% endif %}>PIX</option>
                    <option value="Cartão de Crédito" {% if pagamento.forma_pagamento == 'Cartão de Crédito' %}selected{% endif %}>Cartão de Crédito</option>
                    <option value="Cartão de Débito"  {% if pagamento.forma_pagamento == 'Cartão de Débito' %}selected{% endif %}>Cartão de Débito</option>
                    <option value="Boleto"            {% if pagamento.forma_pagamento == 'Boleto' %}selected{% endif %}>Boleto</option>
                    <option value="Dinheiro"          {% if pagamento.forma_pagamento == 'Dinheiro' %}selected{% endif %}>Dinheiro</option>
                </select>
            </div>
            <div>
                <label for="status_pag" style="font-size: 13px; font-weight: 500; color: #1a1a2e; display: block; margin-bottom: 5px;">
                    Status <span style="color: #e94560;">*</span>
                </label>
                <select id="status_pag" name="status_pag" required
                    style="width: 100%; padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13.5px; outline: none; background: #fff;">
                    <option value="Pendente"  {% if pagamento.status_pag == 'Pendente' %}selected{% endif %}>Pendente</option>
                    <option value="Pago"      {% if pagamento.status_pag == 'Pago' %}selected{% endif %}>Pago</option>
                    <option value="Atrasado"  {% if pagamento.status_pag == 'Atrasado' %}selected{% endif %}>Atrasado</option>
                    <option value="Cancelado" {% if pagamento.status_pag == 'Cancelado' %}selected{% endif %}>Cancelado</option>
                </select>
            </div>
        </div>

        <!-- Valor + Vencimento -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
            <div>
                <label for="valor" style="font-size: 13px; font-weight: 500; color: #1a1a2e; display: block; margin-bottom: 5px;">
                    Valor (R$) <span style="color: #e94560;">*</span>
                </label>
                <input type="number" id="valor" name="valor"
                    value="{{ pagamento.valor }}" step="0.01" min="0" required
                    style="width: 100%; padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13.5px; outline: none;">
            </div>
            <div>
                <label for="vencimento" style="font-size: 13px; font-weight: 500; color: #1a1a2e; display: block; margin-bottom: 5px;">
                    Vencimento <span style="color: #e94560;">*</span>
                </label>
                <input type="date" id="vencimento" name="vencimento"
                    value="{{ pagamento.vencimento|date:'Y-m-d' }}" required
                    style="width: 100%; padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13.5px; outline: none;">
            </div>
        </div>

        <!-- Botões -->
        <div style="display: flex; gap: 10px; padding-top: 1rem; border-top: 0.5px solid #f0f0f0;">
            <button type="submit" class="btn-primary">
                <i class="ti ti-check"></i> Salvar alterações
            </button>
            <a href="{% url 'listar_pagamentos' %}" class="btn-secondary">Cancelar</a>
        </div>

    </form>
</div>

{% endblock %}
