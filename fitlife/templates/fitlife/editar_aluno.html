<h1>Editar Aluno</h1>

<form method="post">
    {% csrf_token %}

    <label for="cpf">CPF:</label><br>
    <input type="text" id="cpf" name="cpf"
           value="{{ aluno.cpf }}" maxlength="11" readonly><br><br>

    <label for="nome_aluno">Nome Completo:</label><br>
    <input type="text" id="nome_aluno" name="nome_aluno"
           value="{{ aluno.nome_aluno }}" maxlength="150" required><br><br>

    <label for="data_nascimento">Data de Nascimento:</label><br>
    <input type="date" id="data_nascimento" name="data_nascimento"
           value="{{ aluno.data_nascimento|date:'Y-m-d' }}" required><br><br>

    <label for="endereco_aluno">Endereço:</label><br>
    <input type="text" id="endereco_aluno" name="endereco_aluno"
           value="{{ aluno.endereco_aluno }}" maxlength="255" required><br><br>

    <label for="telefone_aluno">Telefone:</label><br>
    <input type="text" id="telefone_aluno" name="telefone_aluno"
           value="{{ aluno.telefone_aluno }}" maxlength="20" required><br><br>

    <label for="e_mail">E-mail:</label><br>
    <input type="email" id="e_mail" name="e_mail"
           value="{{ aluno.e_mail }}" maxlength="150" required><br><br>

    <label for="restricoes">Restrições Médicas:</label><br>
    <textarea id="restricoes" name="restricoes">{{ aluno.restricoes }}</textarea><br><br>

    <button type="submit">Salvar alterações</button>
</form>

<br>
<a href="{% url 'listar_alunos' %}">Voltar</a>
