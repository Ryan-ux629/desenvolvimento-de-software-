{% extends 'fitlife/base.html' %}

{% block title %}Novo Aluno — FitLife{% endblock %}
{% block topbar_title %}Novo Aluno{% endblock %}
{% block nav_alunos %}active{% endblock %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Novo Aluno</h1>
    <a href="{% url 'listar_alunos' %}" class="btn-secondary">
        <i class="ti ti-arrow-left"></i> Voltar
    </a>
</div>

<div class="card" style="max-width: 680px;">
    <form method="post">
        {% csrf_token %}

        <!-- CPF + Data de Nascimento -->
        <div class="form-row" style="margin-bottom: 1.1rem;">
            <div>
                <label for="cpf" class="form-label">CPF <span class="req">*</span></label>
                <input type="text" id="cpf" name="cpf" class="form-input" maxlength="11" placeholder="Somente números" required>
            </div>
            <div>
                <label for="data_nascimento" class="form-label">Data de Nascimento <span class="req">*</span></label>
                <input type="date" id="data_nascimento" name="data_nascimento" class="form-input" required>
            </div>
        </div>

        <!-- Nome -->
        <div class="form-group">
            <label for="nome_aluno" class="form-label">Nome Completo <span class="req">*</span></label>
            <input type="text" id="nome_aluno" name="nome_aluno" class="form-input" maxlength="150" placeholder="Nome do aluno" required>
        </div>

        <!-- Telefone + E-mail -->
        <div class="form-row" style="margin-bottom: 1.1rem;">
            <div>
                <label for="telefone_aluno" class="form-label">Telefone <span class="req">*</span></label>
                <input type="text" id="telefone_aluno" name="telefone_aluno" class="form-input" maxlength="20" placeholder="(00) 00000-0000" required>
            </div>
            <div>
                <label for="e_mail" class="form-label">E-mail <span class="req">*</span></label>
                <input type="email" id="e_mail" name="e_mail" class="form-input" maxlength="150" placeholder="email@exemplo.com" required>
            </div>
        </div>

        <!-- Endereço -->
        <div class="form-group">
            <label for="endereco_aluno" class="form-label">Endereço <span class="req">*</span></label>
            <input type="text" id="endereco_aluno" name="endereco_aluno" class="form-input" maxlength="255" placeholder="Rua, número, bairro, cidade" required>
        </div>

        <!-- Restrições -->
        <div class="form-group">
            <label for="restricoes" class="form-label">Restrições Médicas <span class="hint">(opcional)</span></label>
            <textarea id="restricoes" name="restricoes" class="form-textarea" placeholder="Descreva quaisquer restrições ou condições médicas relevantes..."></textarea>
        </div>

        <!-- Botões -->
        <div class="form-actions">
            <button type="submit" class="btn-primary">
                <i class="ti ti-check"></i> Salvar
            </button>
            <a href="{% url 'listar_alunos' %}" class="btn-secondary">Cancelar</a>
        </div>

    </form>
</div>

{% endblock %}
